<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Java Thymeleaf Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; justify-content: center; margin-top: 50px; background-color: #f4f4f9; }
    .calc-box { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 300px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 10px; background: #007bff; border: none; color: white; font-size: 16px; border-radius: 4px; cursor: pointer; }
    button:hover { background: #0056b3; }
    .output { margin-top: 20px; padding: 10px; border-radius: 4px; font-weight: bold; text-align: center; }
    .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
  </style>
</head>
<body>

<div class="calc-box">
  <h2> Calculator App </h2>
  <form th:action="@{/calculator/calculate}" method="post">

    <div class="form-group">
      <label for="num1">First Number:</label>
      <input type="number" step="any" id="num1" name="num1" th:value="${num1}" required />
    </div>

    <div class="form-group">
      <label for="operator">Operation:</label>
      <select id="operator" name="operator">
        <option value="+" th:selected="${operator == '+'}">Addition (+)</option>
        <option value="-" th:selected="${operator == '-'}">Subtraction (-)</option>
        <option value="*" th:selected="${operator == '*'}">Multiplication (*)</option>
        <option value="/" th:selected="${operator == '/'}">Division (/)</option>
      </select>
    </div>

    <div class="form-group">
      <label for="num2">Second Number:</label>
      <input type="number" step="any" id="num2" name="num2" th:value="${num2}" required />
    </div>

    <button type="submit">Calculate</button>
  </form>

  <!-- Error Alert Display -->
  <div class="output error" th:if="${error}" th:text="${error}"></div>

  <!-- Successful Result Display -->
  <div class="output success" th:if="${result != null && error == null && result != ''}">
    Result: <span th:text="${result}">0</span>
  </div>
</div>

</body>
</html>
